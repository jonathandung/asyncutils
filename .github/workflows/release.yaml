name: Build and publish
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  publish:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/py-asyncutils/${{github.event.release.name}}
    steps:
      - run: |
          NAME="${{github.event.release.name}}"
          if [[ ! $NAME =~ ^[0-9]+\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])\.(25[0-5]|2[0-4][0-9]|1[0-9]{2}|[1-9]?[0-9])$ ]]; then
            echo "Release name '$NAME' does not match the expected format 'X.Y.Z' where Y and Z are between 0 and 255"
            exit 1
          fi
      - uses: actions/checkout@v7.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - run: uv build
      - run: uv publish
