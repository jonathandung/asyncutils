name: Python package
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.12, 3.13, 3.14]
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: ${{matrix.python-version}}
    - name: Install dependencies
      run: |
        pip install -U pip
        pip install -e .[dev,json]
        pip check
    - name: Lint with ruff
      run: ruff check . --output-format=github
    - name: Run mypy
      run: python -m mypy asyncutils
    - name: Run tests
      run: python -m pytest tests/ -v --tb short --cov asyncutils --cov-report xml --local-badge-output-dir . --local-badge-generate status -n auto
    - name: Upload coverage
      uses: codecov/codecov-action@v5.5.3
      with:
        disable_search: true
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        token: ${{secrets.CODECOV_TOKEN}}