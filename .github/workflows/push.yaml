name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  primary:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
      with:
        ref: ${{github.event.pull_request.head.sha || github.sha}}
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: "3.15"
    - run: uvx ruff check --output-format=github
    - run: uvx ty check --output-format=github
    - run: uv run --with ".[test]" pytest -vv -p asyncio -p no:asyncio-cooperative --no-local-badge --tb long --cov-report xml
    - uses: codecov/codecov-action@v7.0.0
      with:
        flags: unittests
        name: codecov-umbrella
        token: ${{secrets.CODECOV_TOKEN}}
        verbose: true
  cross-platform:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.15"]
        include:
          - os: ubuntu-latest
            python-version: gp312
          - os: ubuntu-latest
            python-version: 3.14t
        exclude:
          - os: ubuntu-latest
            python-version: "3.15"
    steps:
    - uses: actions/checkout@v7.0.0
    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        python-version: ${{matrix.python-version}}
    - run: uv run --with ".[test]" pytest -vv -p asyncio --no-cov -p no:asyncio-cooperative --no-local-badge --tb long
