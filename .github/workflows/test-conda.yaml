name: Conda installation
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: [3.12, 3.13, 3.14]
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: conda-incubator/setup-miniconda@v3.3.0
      with:
        auto-update-conda: true
        python-version: ${{matrix.python-version}}
    - name: Test conda install
      shell: bash -l {0}
      run: conda install conda-forge::py-asyncutils=0.8.20 python=${{matrix.python-version}} --dry-run