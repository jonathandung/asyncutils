name: Build and publish
on:
  release:
    types: [published]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/py-asyncutils/${{github.event.release.name}}
    steps:
      - run: |
          RELNAME="${{github.event.release.name}}"
          if [[! $RELNAME =~ ^[0-9]+.[0-9]+.[0-9]+$ ]]; then
            exit 1
          fi
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          python-version: 3.14
          cache-python: true
          activate-environment: true
      - name: Upload to PyPI
        run: uv pip install -e . && uv build && uv publish