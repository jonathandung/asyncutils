name: Upload Python Package
on:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  release-build:
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Build release distributions
        run: |
          pip install -U pip
          pip install build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists-${{matrix.os}}
          path: dist/
  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/py-asyncutils/${{github.event.release.name}}
    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-dists-*
          path: dist/
          merge-multiple: true
      - name: Publish release distributions to PyPI using twine
        run: |
          pip install -U packaging twine
          twine upload dist/* --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{secrets.PYPI_TOKEN}}
