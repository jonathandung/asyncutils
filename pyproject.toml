[build-system]
requires = ["setuptools>=82", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "py-asyncutils"
version = "0.8.21"
authors = [{name = "Jonathan Dung", email = "jonathandung@yahoo.com"}]
maintainers = [{name = "Jonathan Dung", email = "jonathandung@yahoo.com"}]
description = "A library containing versatile tools to well complement the asyncio framework. Not as performant as C extensions, but startup speed is great considering the features it provides."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE", "AUTHORS.md"]
keywords = ["asynchronous", "convenient", "fast", "light", "feature-rich"]
classifiers = ["Programming Language :: Python :: 3", "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.12", "Programming Language :: Python :: 3.13", "Programming Language :: Python :: 3.14", "Programming Language :: Python :: Implementation :: CPython", "Operating System :: OS Independent", "Development Status :: 3 - Alpha", "Intended Audience :: Developers", "Topic :: Software Development :: Libraries :: Python Modules", "Topic :: Software Development :: Version Control :: Git", "Topic :: Utilities", "Framework :: AsyncIO", "Natural Language :: English", "Typing :: Typed"]

[project.urls]
Homepage = "https://github.com/jonathandung/asyncutils"
Repository = "https://github.com/jonathandung/asyncutils.git"
Issues = "https://github.com/jonathandung/asyncutils/issues"
Changelog = "https://github.com/jonathandung/asyncutils/blob/main/CHANGELOG.md"

[project.scripts]
asyncutils = 'asyncutils.cli:run'
autils = 'asyncutils.cli:run'

[project.optional-dependencies]
dev = ["ruff>=0.15.8", "mypy>=1.19.1", "pytest>=9.0.2", "pytest-xdist>=3.8.0", "pytest-cov>=7.1.0", "pytest-mock>=3.15.1", "pytest-local-badge>=1.0.3", "pytest-asyncio>=1.3.0"]
docs = ["sphinx>=9.1.0", "sphinx_rtd_theme>=3.1.0", "sphinx-notfound-page>=1.1.0", "sphinx-autoapi>=3.8.0", "doc8>=2.0.0", "sphinx-lint>=1.0.2"]
pub = ["build>=1.4.2", "twine>=6.2.0"]
json = ["json-with-comments>=1.2.10", "json5>=0.14.0", "hjson>=3.1.0"]
all = ["py-asyncutils[dev,docs,pub,json]>=0.8.21"]

[tool.setuptools]
packages = ["asyncutils", "asyncutils._internal"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = ["-v", "--tb", "short", "--cov", "asyncutils", "--cov-report", "term-missing", "--cov-fail-under", "50"]
minversion = "9.0"
required_plugins = ["pytest-xdist>=3.8.0", "pytest-cov>=7.1.0", "pytest-mock>=3.15.1", "pytest-local-badge>=1.0.3", "pytest-asyncio>=1.3.0"]
log_level = "DEBUG"
log_format = "%(asctime)s %(levelname)s %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
log_file = ".logs/pytest-logs.txt"
log_file_mode = "a"

[tool.coverage.run]
source = ["asyncutils"]
omit = ["*/__main__.py", "*/_internal/compat.py", "*/_internal/py313.py", "*/_internal/py312.py", "*/console.py", "*/cli.py"]

[tool.coverage.report]
exclude_lines = [".*# pragma: no (cover|branch)", "if __name__ == '__main__':", "raise NotImplementedError", "def __repr__\\(self.*\\):", "\\.\\.\\."]

[tool.ruff]
target-version = "py312"
exclude = [".git", "__pycache__", "build", "dist", "venv", "env", ".venv", ".env", "*.egg-info", ".eggs", ".mypy_cache", ".pytest_cache", "docs/source/conf.py"]

[tool.ruff.lint]
ignore = ["C408", "C901", "E225", "E226", "E227", "E228", "E261", "E301", "E302", "E305", "E306", "E401", "E402", "E501", "E701", "E702",  "E722", "E741", "W292", "F401"]
select = ["C", "E", "F", "W"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "F403", "F405"]
"__init__.pyi" = ["F403", "F405"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.format]
quote-style = "single"
skip-magic-trailing-comma = true

[tool.doc8]
max-line-length = 150
extension = ["rst"]
