[build-system]
requires = ["setuptools>=82", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "py-asyncutils"
version = "0.8.17"
authors = [{name = "Jonathan Dung", email = "jonathandung@yahoo.com"}]
maintainers = [{name = "Jonathan Dung", email = "jonathandung@yahoo.com"}]
description = "A library containing versatile and adaptable tools to well complement the asyncio framework. Not as performant as C extensions, but startup speed is great considering the features it provides."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
license-files = ["LICENSE", "AUTHORS.md"]
keywords = ["asynchronous", "convenient", "fast", "light", "feature-rich"]
classifiers = ["Programming Language :: Python :: 3", "Programming Language :: Python :: 3 :: Only", "Programming Language :: Python :: 3.14", "Programming Language :: Python :: Implementation :: CPython", "Operating System :: OS Independent", "Development Status :: 3 - Alpha", "Intended Audience :: Developers", "Topic :: Software Development :: Libraries :: Python Modules", "Topic :: Software Development :: Version Control :: Git", "Topic :: Utilities", "Framework :: AsyncIO", "Natural Language :: English", "Typing :: Typed"]

[project.urls]
Homepage = "https://github.com/jonathandung/asyncutils"
Repository = "https://github.com/jonathandung/asyncutils.git"
Issues = "https://github.com/jonathandung/asyncutils/issues"
Changelog = "https://github.com/jonathandung/asyncutils/blob/main/CHANGELOG.md"

[project.scripts]
asyncutils = 'asyncutils.cli:run'
autils = 'asyncutils.cli:run'

[project.optional-dependencies]
dev = ["ruff>=0.15.0", "pytest>=9.0.0", "pytest-xdist>=3.8.0", "pytest-cov>=7.0.0", "pytest-mock>=3.15.0", "pytest-local-badge>=1.0.0", "pytest-asyncio>=1.3.0"]

[tool.setuptools]
packages = ["asyncutils", "asyncutils._internal"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = ["-v", "--cov", "asyncutils", "--cov-report", "term-missing", "--cov-fail-under", "45"]
minversion = "9.0"
required_plugins = ["pytest-xdist>=3.8.0", "pytest-cov>=7.0.0", "pytest-mock>=3.15.0", "pytest-local-badge>=1.0.0", "pytest-asyncio>=1.3.0"]
log_level = "DEBUG"
log_format = "%(asctime)s %(levelname)s %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
log_file = ".logs/pytest-logs.txt"
log_file_mode = "a"

[tool.coverage.run]
source = ["asyncutils"]
omit = ["*/__main__.py"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if __name__ == '__main__':", "raise NotImplementedError"]

[tool.ruff]
exclude = [".git", "__pycache__", "build", "dist", "venv", "env", ".venv", ".env", "*.egg-info", ".eggs", ".mypy_cache", ".pytest_cache", ".tox", "docs/conf.py"]

[tool.ruff.lint]
ignore = ["C408", "C901", "E225", "E226", "E227", "E228", "E261", "E301", "E302", "E305", "E306", "E401", "E402", "E501", "E701", "E702",  "E722", "E741", "W292", "F401"]
select = ["C", "E", "F", "W"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101", "F403", "F405"]
"__init__.pyi" = ["F403", "F405"]

[tool.ruff.lint.mccabe]
max-complexity = 10
