[build-system]
requires = ["setuptools>=77.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "py-asyncutils"
version = "0.8.14"
authors = [{name = "Jonathan Dung", email = "jonathandung@yahoo.com"}]
description = "A library containing versatile and adaptable tools to well complement the asyncio framework. Not as performant as C extensions, but startup speed is great considering the features it provides."
readme = "README.md"
requires-python = ">=3.14"
license = "MIT"
keywords = ["asynchronous", "convenient", "fast", "light", "feature-rich"]
classifiers = ["Programming Language :: Python :: 3", "Operating System :: OS Independent"]

[project.urls]
Homepage = "https://github.com/jonathandung/asyncutils"
Repository = "https://github.com/jonathandung/asyncutils.git"

[project.scripts]
asyncutils = 'asyncutils.cli:run'
autils = 'asyncutils.cli:run'

[project.optional-dependencies]
dev = ["black", "flake8"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = ["-v", "--cov=asyncutils", "--cov-report=term-missing", "--cov-fail-under=40"]
log_level = "DEBUG"
log_cli = true
minversion = "9.0"
required_plugins = ["pytest-xdist>=3.8.0", "pytest-cov>=7.0.0", "pytest-mock>=3.15.0"]
log_format = "%(asctime)s %(levelname)s %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
log_file = ".logs/pytest-logs.txt"

[tool.coverage.run]
source = ["asyncutils"]
omit = ["*/__main__.py"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "if __name__ == .__main__.:", "raise NotImplementedError"]