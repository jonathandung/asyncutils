
<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    width="89.81"
    height="20"
    role="img"
    aria-label="duration: 1.0s"
>
    <style>
        rect {
            height: 20px;
        }

        text {
            text-rendering: geometricPrecision;
            dominant-baseline: middle;
            text-anchor: middle;
            font-family: Verdana,Geneva,DejaVu Sans,sans-serif;
            font-size: 110px;
            fill: #fff;
        }

        .shadow {
            transform: translate(10px, 10px);
            fill: #010101;
        }
    </style>
    <title>duration: 1.0s</title>
    <linearGradient id="s" x2="0" y2="100%">
        <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
        <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
    <clipPath id="r">
        <rect width="100%" rx="3" fill="#fff"/>
    </clipPath>
    <g clip-path="url(#r)" >
        <g>
            <rect width="56.1" fill="#555"/>
            <g transform="scale(.1)">
                <text x="280.5" y="100" textLength="461" class="shadow">duration</text>
                <text x="280.5" y="100" textLength="461">duration</text>
            </g>
        </g>
        <g transform="translate(56.1 0)">
            <rect width="33.71" fill="#4c1"/>
            <g transform="scale(.1)">
                <text x="168.55" y="100" textLength="237.1" class="shadow">1.0s</text>
                <text x="168.55" y="100" textLength="237.1">1.0s</text>
            </g>
        </g>
        <rect width="100%" height="100%" fill="url(#s)"/>
    </g>
</svg>
