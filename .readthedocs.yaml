version: 2
sphinx:
  configuration: docs/source/conf.py
build:
  os: ubuntu-lts-latest
  tools:
    python: latest
  jobs:
    post_create_environment:
      - cp AI_USAGE_POLICY.md docs/source/ai-use.md
      - cp CHANGELOG.md docs/source/changelog.md
      - cp CODE_OF_CONDUCT.md docs/source/conduct.md
      - cp COMPATIBILITY.rst docs/source/compat.rst
      - cp CONTRIBUTING.md docs/source/contributing.md
      - cp EXAMPLES.md docs/source/examples.md
      - cp ROADMAP.md docs/source/roadmap.md
      - cp SECURITY.md docs/source/security.md
      - cp SUPPORT.md docs/source/support.md
formats:
  - htmlzip
  - pdf
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs