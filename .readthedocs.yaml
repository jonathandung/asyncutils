version: 2
sphinx:
  configuration: docs/source/conf.py
build:
  os: ubuntu-26.04
  tools:
    python: latest
  jobs:
    post_create_environment:
      - scripts/genhelp.sh
      - scripts/genmakefileusage.sh
      - scripts/rtd.sh
formats:
  - htmlzip
  - pdf
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - themes
