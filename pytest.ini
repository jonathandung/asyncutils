[pytest]
pythonpath=.
testpaths=tests
python_files=test_*.py
python_classes=Test*
python_functions=test_*
addopts=-v --cov=your_library --cov-report=term-missing
log_level=DEBUG
log_cli=true
minversion=9.0
required_plugins = pytest-xdist>=3.8.0 pytest-cov>=7.0.0 pytest-mock>=3.15.0
log_format=%(asctime)s %(levelname)s %(message)s
log_date_format=%Y-%m-%d %H:%M:%S
log_file=logs/pytest-logs.txt